# Render Blueprint – deploy backend to https://dashboard.render.com
# After deploy, set VITE_API_BASE in frontend and run: npm run build && npm run deploy
services:
  - type: web
    name: portfolio-backend
    runtime: java
    rootDir: backend
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/portfolio-backend-0.0.1-SNAPSHOT.jar
